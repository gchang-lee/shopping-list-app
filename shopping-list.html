<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      padding: 28px 24px 20px;
      color: white;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .summary {
      font-size: 13px;
      opacity: 0.75;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #f0f4f8;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area input::placeholder {
      color: #a0aec0;
    }

    .add-btn {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #4338ca;
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f4f8;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e2e8f0;
      background: white;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #718096;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    .list {
      padding: 12px 24px 8px;
      min-height: 120px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: #a0aec0;
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 14px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f7fafc;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child {
      border-bottom: none;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #cbd5e0;
      background: white;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .check-btn.checked {
      background: #48bb78;
      border-color: #48bb78;
    }

    .check-btn.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #2d3748;
      transition: all 0.2s;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 18px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fff5f5;
      color: #fc8181;
    }

    .footer {
      padding: 14px 24px 20px;
      border-top: 1px solid #f0f4f8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      font-size: 13px;
      color: #a0aec0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .progress {
      font-size: 12px;
      color: #a0aec0;
    }

    .progress span {
      font-weight: 600;
      color: #48bb78;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>쇼핑 리스트</h1>
      <div class="summary" id="summary">아이템이 없습니다</div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="item-input"
        placeholder="아이템 추가..."
        maxlength="80"
        autocomplete="off"
      >
      <button class="add-btn" onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" data-filter="todo" onclick="setFilter('todo', this)">미완료</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
      <div class="progress" id="progress"></div>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-items') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping-items', JSON.stringify(items));
    }

    function addItem() {
      const input = document.getElementById('item-input');
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }
      items.unshift({ id: Date.now(), text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.done = !item.done;
        save();
        render();
      }
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const total = items.length;
      const done = items.filter(i => i.done).length;

      // Summary
      const summary = document.getElementById('summary');
      summary.textContent = total === 0
        ? '아이템이 없습니다'
        : `총 ${total}개 · 완료 ${done}개`;

      // Progress
      const progress = document.getElementById('progress');
      progress.innerHTML = total > 0
        ? `<span>${done}</span> / ${total} 완료`
        : '';

      // Filtered list
      const visible = items.filter(i => {
        if (filter === 'todo') return !i.done;
        if (filter === 'done') return i.done;
        return true;
      });

      const list = document.getElementById('list');

      if (visible.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">${filter === 'done' ? '✅' : '🛒'}</div>
            <p>${filter === 'done' ? '완료된 항목이 없습니다' : filter === 'todo' ? '미완료 항목이 없습니다' : '쇼핑 리스트가 비어있습니다'}</p>
          </div>`;
        return;
      }

      list.innerHTML = visible.map(item => `
        <div class="item" id="item-${item.id}">
          <button
            class="check-btn ${item.done ? 'checked' : ''}"
            onclick="toggleItem(${item.id})"
            title="${item.done ? '미완료로 변경' : '완료로 변경'}"
          ></button>
          <span class="item-text ${item.done ? 'done' : ''}">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">×</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Enter key to add
    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
